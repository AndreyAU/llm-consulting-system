services:
  redis:
    image: redis:7
    container_name: llm_redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: llm_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  bot_api:
    build:
      context: ./bot_service
    container_name: llm_bot_api
    env_file:
      - ./bot_service/.env
    ports:
      - "8001:8001"
    depends_on:
      - redis
      - rabbitmq
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8001

  bot:
    build:
      context: ./bot_service
    container_name: llm_bot
    env_file:
      - ./bot_service/.env
    depends_on:
      - redis
      - rabbitmq
    command: uv run python -m app.bot.main

  celery_worker:
    build:
      context: ./bot_service
    container_name: llm_celery_worker
    env_file:
      - ./bot_service/.env
    depends_on:
      - redis
      - rabbitmq
    command: uv run celery -A app.infra.celery_app.celery_app worker --loglevel=info
